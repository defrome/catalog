<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tecmaster - Товары</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #E8E8E8;
            --search-grad: linear-gradient(180deg, #CECECE 0%, #EFEFEF 100%);
            --accent-color: #FFBE00;
            --text-dark: #000000;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding-bottom: 120px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ПОИСК */
        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg-main);
            padding: 15px 20px;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .search-bar {
            width: 100%;
            max-width: 400px; 
            height: 44px;  
            background: var(--search-grad);
            border-radius: 22px; 
            display: flex;
            align-items: center;
            padding: 0 18px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .search-icon {
            width: 16px; 
            height: 16px;
            margin-right: 12px;
            opacity: 0.5;
        }

        .search-input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-weight: 300; 
            font-size: 14px;  
            color: var(--text-dark);
        }

        .page-header {
            padding: 10px 25px 15px;
        }

        .page-header h2 {
            font-weight: 800;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #000 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* СЕТКА ТОВАРОВ */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px;
            padding: 0 20px;
            flex-grow: 1;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            text-decoration: none;
            color: inherit;
            /* Плавная анимация нажатия */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        /* Эффект при клике */
        .product-card:active {
            transform: scale(0.95);
        }

        .product-img-box {
            width: 100%;
            aspect-ratio: 1 / 0.85;
            background: #F2F2F2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-title {
            font-weight: 800; 
            font-size: 14px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .footer-logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 30px 0 40px;
        }

        .footer-logo {
            width: 110px;
            height: auto;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-bar">
            <img src="search_icon.png" class="search-icon">
            <input type="text" class="search-input" placeholder="Поиск товаров...">
        </div>
    </div>

    <div class="page-header">
        <h2>Товары</h2>
    </div>

    <div class="catalog-grid">
        <script>
            // Генерация карточек для примера
            for(let i=1; i<=6; i++) {
                document.write(`
                    <a href="#" class="product-card">
                        <div class="product-img-box"><img src="mockup_image.jpg"></div>
                        <div class="product-info">
                            <div class="product-title">Товар test${i}</div>
                        </div>
                    </a>
                `);
            }
        </script>
    </div>

    <div class="footer-logo-container">
        <img src="spraystorelogo.png" class="footer-logo" alt="Logo">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Нативная кнопка "Назад" в Telegram
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            window.history.back();
        });

        // Виброотклик при клике
        document.querySelectorAll('.product-card').forEach(card => {
            card.onclick = () => {
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light'); // Легкий приятный тап
                }
            };
        });
    </script>
</body>
</html>
